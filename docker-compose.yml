version: '3.8'

services:
  app:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    ports:
      - "5000:5000"
    environment:
      - ConnectionStrings__DefaultConnection=Server=db;Database=SmartHireDB;User Id=sa;Password=SmartHire2026!;TrustServerCertificate=True
      - Gemini__ApiKey=${GEMINI_API_KEY}
    depends_on:
      - db

  db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    ports:
      - "1433:1433"
    environment:
      - ACCEPT_EULA=Y
      - SA_PASSWORD=SmartHire2026!
      - MSSQL_PID=Developer
    volumes:
      - sqldata:/var/opt/mssql

volumes:
  sqldata:
